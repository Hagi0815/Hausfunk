<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hausfunk</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div id="login-screen" class="screen">
    <div class="login-panel">
      <div class="brand">
        <span class="brand-led"></span>
        <h1>HAUSFUNK</h1>
      </div>
      <p class="tagline">Privater Kanal &middot; nur im Heimnetz</p>
      <input id="name-input" type="text" placeholder="Dein Name" maxlength="24" autocomplete="off" />
      <button id="join-btn">Kanal betreten</button>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand small">
        <span class="brand-led"></span>
        <h1>HAUSFUNK</h1>
      </div>
      <div class="online-label">ONLINE &middot; <span id="online-count">0</span></div>
      <ul id="user-list"></ul>
      <div id="notif-status" class="notif-status"></div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Nutzerliste anzeigen">
          <span class="brand-led small-led"></span>
          <span id="online-count-mobile">0</span> online
        </button>
      </header>

      <div id="messages" class="messages"></div>
      <div id="typing-indicator" class="typing"></div>

      <div class="input-bar">
        <button id="image-btn" title="Bild senden" aria-label="Bild senden">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <circle cx="8.5" cy="9.5" r="1.5"/>
            <path d="M21 15l-5-5-9 9"/>
          </svg>
        </button>
        <input id="file-input" type="file" accept="image/*" hidden />
        <textarea id="text-input" rows="1" placeholder="Nachricht schreiben..." autocomplete="off"></textarea>
        <button id="send-btn" title="Senden" aria-label="Senden">SENDEN</button>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
