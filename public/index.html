<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hausfunk</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div id="login-screen" class="screen">
    <div class="login-panel">
      <div class="brand">
        <span class="brand-led"></span>
        <h1>HAUSFUNK</h1>
      </div>
      <p class="tagline">Privater Kanal &middot; nur im Heimnetz</p>

      <div id="login-online" class="login-online">
        <div class="online-label">GERADE ONLINE</div>
        <ul id="login-user-list" class="login-user-list hidden"></ul>
        <div id="login-online-empty" class="login-online-empty">Noch niemand da</div>
      </div>

      <input id="name-input" type="text" placeholder="Dein Name" maxlength="24" autocomplete="off" />

      <div id="admin-password-row" class="admin-password-row hidden">
        <input id="admin-password-input" type="password" placeholder="Admin-Passwort" autocomplete="off" />
      </div>
      <div id="join-error" class="join-error hidden"></div>

      <div class="avatar-picker">
        <div class="online-label">DEIN SYMBOL</div>
        <div class="avatar-preview-row">
          <div id="avatar-preview" class="avatar-preview"></div>
          <button id="avatar-upload-btn" type="button" class="avatar-upload-btn">📷 Eigenes Bild</button>
          <input id="avatar-file-input" type="file" accept="image/*" hidden />
        </div>
        <div id="avatar-list" class="avatar-list"></div>
      </div>

      <button id="join-btn">Kanal betreten</button>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand small">
        <span class="brand-led"></span>
        <h1>HAUSFUNK</h1>
        <div class="brand-actions">
          <button id="admin-panel-toggle" class="icon-toggle admin-only" title="Admin" aria-label="Admin">🛡</button>
          <button id="gallery-toggle" class="icon-toggle" title="Bilder-Galerie" aria-label="Bilder-Galerie">🖼</button>
          <button id="search-toggle" class="icon-toggle" title="Suche" aria-label="Suche">🔍</button>
        </div>
      </div>

      <div class="room-list-section">
        <div class="online-label">KANÄLE</div>
        <ul id="room-list" class="room-list"></ul>
      </div>

      <div class="online-label">ONLINE &middot; <span id="online-count">0</span></div>
      <ul id="user-list"></ul>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="sound-toggle" type="button"></button>
        <button id="sound-toggle" class="sound-toggle" type="button"></button>
        <div id="notif-status" class="notif-status"></div>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <span id="room-title" class="room-title"></span>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Nutzerliste anzeigen">
          <span class="brand-led small-led"></span>
          <span id="online-count-mobile">0</span> online
        </button>
      </header>

      <div id="search-bar" class="search-bar hidden">
        <input id="search-input" type="text" placeholder="Suche nach Text oder Namen..." autocomplete="off" />
        <button id="search-close" aria-label="Suche schließen">✕</button>
      </div>

      <div id="pinned-bar" class="pinned-bar hidden">
        <div class="pinned-content">
          <span class="pinned-label">📌 Angepinnt</span>
          <span id="pinned-text" class="pinned-text"></span>
        </div>
        <button id="pinned-unpin" aria-label="Lösen">✕</button>
      </div>

      <div id="messages" class="messages"></div>
      <div id="typing-indicator" class="typing"></div>

      <div id="reply-preview" class="reply-preview hidden">
        <div class="reply-preview-content">
          <span class="reply-label">Antwort an <span id="reply-preview-sender"></span></span>
          <span id="reply-preview-text" class="reply-preview-text"></span>
        </div>
        <button id="reply-cancel" aria-label="Antwort abbrechen">✕</button>
      </div>

      <div class="input-bar-wrapper">
        <div id="emoji-picker" class="emoji-picker hidden"></div>
        <div class="input-bar">
          <button id="image-btn" title="Bild senden" aria-label="Bild senden">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <circle cx="8.5" cy="9.5" r="1.5"/>
              <path d="M21 15l-5-5-9 9"/>
            </svg>
          </button>
          <input id="file-input" type="file" accept="image/*" hidden />
          <button id="mic-btn" title="Sprachnachricht (gedrückt halten)" aria-label="Sprachnachricht aufnehmen">🎙️</button>
          <button id="emoji-btn" title="Emoji einfügen" aria-label="Emoji einfügen">🙂</button>
          <textarea id="text-input" rows="1" placeholder="Nachricht schreiben..." autocomplete="off"></textarea>
          <button id="send-btn" title="Senden" aria-label="Senden">SENDEN</button>
        </div>
      </div>
    </main>
  </div>

  <div id="gallery-overlay" class="gallery-overlay hidden">
    <div class="gallery-panel">
      <div class="gallery-header">
        <span>🖼 Geteilte Bilder</span>
        <button id="gallery-close" aria-label="Schließen">✕</button>
      </div>
      <div id="gallery-grid" class="gallery-grid"></div>
    </div>
  </div>

  <div id="admin-overlay" class="gallery-overlay hidden">
    <div class="gallery-panel">
      <div class="gallery-header">
        <span>🛡 Admin &middot; Gesperrte Nutzer</span>
        <button id="admin-overlay-close" aria-label="Schließen">✕</button>
      </div>
      <ul id="banned-list" class="banned-list"></ul>
      <div id="banned-empty" class="gallery-empty hidden">Niemand gesperrt.</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
